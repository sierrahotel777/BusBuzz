name: Deploy App

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'terraform/**'   # Ignore Terraform infra changes

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build Backend
        run: |
          cd backend
          npm install
          npm run build
          zip -r ../backend.zip .

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
          zip -r ../frontend.zip .
          
      - name: Deploy Backend
        run: |
          az webapp deployment source config-zip \
            --resource-group bussbuzz-rg \
            --name bussbuzz-backend-app \
            --src ./backend.zip

      - name: Deploy Frontend
        run: |
          az webapp deployment source config-zip \
            --resource-group bussbuzz-rg \
            --name bussbuzz-frontend-app \
            --src ./frontend.zip
